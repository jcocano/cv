# Builds the static Astro site. Acts as the canonical "the production
# artifact compiles" check. Reusable workflow only: invoked by `ci.yml` on
# pull_request and by `deploy.yml` on push to main. Kept separate from
# `deploy.yml`'s deploy job so that PR runs validate the build without
# touching Pages, and so that a build regression appears as its own red
# job inside the `CI` run.
name: Build

on:
  workflow_call:

jobs:
  build:
    name: astro build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build site
        run: npm run build
