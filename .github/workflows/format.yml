# Verifies that every tracked file matches Prettier's expected formatting.
# Lives as its own workflow so the Actions tab shows a clear "Format" check
# next to its peers (lint, typecheck, ...) instead of hiding it inside a
# monolithic CI job.
name: Format

on:
  pull_request:
  workflow_call:

jobs:
  format:
    name: prettier --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run prettier --check
        run: npm run format:check
