# Verifies that every tracked file matches Prettier's expected formatting.
# Reusable workflow only: invoked by `ci.yml` on pull_request and by
# `deploy.yml` on push to main. Kept as its own file so the responsibility
# (formatting check) lives in one place; the `CI` run on PRs shows it as
# a dedicated `format` job next to its peers (lint, typecheck, ...).
name: Format

# Force GitHub-provided JavaScript actions (e.g. actions/checkout,
# actions/setup-node) to run on Node 24 ahead of the 2026-06-02 deprecation
# of Node 20. Value must be a string per GitHub's env contract.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_call:

jobs:
  format:
    name: prettier --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run prettier --check
        run: npm run format:check
