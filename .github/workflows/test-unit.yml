# Runs the Vitest unit + render-test suite. Lives in its own workflow so test
# failures surface as an isolated "Unit tests" check, which makes triage
# obvious when both unit and visual suites exist in the same pipeline.
name: Unit tests

on:
  pull_request:
  workflow_call:

jobs:
  test-unit:
    name: vitest run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run vitest
        run: npm test
