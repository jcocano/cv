# Runs the Vitest suite. Reusable workflow only: invoked by `ci.yml` on
# pull_request and by `deploy.yml` on push to main. Kept as its own file so
# test failures surface as an isolated `test-unit` job, which makes triage
# obvious when both unit and visual suites exist in the same pipeline.
#
# Why two setup steps before `npm test`:
#   1. Build: produces `dist/` so the a11y axe tests in `tests/a11y/` can
#      audit the actual built HTML pages.
#   2. Test: runs vitest. The Astro content layer data store
#      (`.astro/data-store.json`) is regenerated automatically by the
#      `pretest` hook in `package.json`, which invokes
#      `tooling/sync-data-store.mjs`. See `docs/verification.md` §5.1 for
#      the full rationale on why the data store needs an explicit refresh
#      before vitest's `getCollection(...)` calls.
name: Unit tests

on:
  workflow_call:

jobs:
  test-unit:
    name: vitest run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build site for a11y tests
        run: npm run build
      - name: Run vitest
        run: npm test
