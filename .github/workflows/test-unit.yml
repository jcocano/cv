# Runs the Vitest unit + render-test suite. Reusable workflow only: invoked
# by `ci.yml` on pull_request and by `deploy.yml` on push to main. Kept as
# its own file so test failures surface as an isolated `test-unit` job,
# which makes triage obvious when both unit and visual suites exist in the
# same pipeline.
name: Unit tests

on:
  workflow_call:

jobs:
  test-unit:
    name: vitest run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run vitest
        run: npm test
