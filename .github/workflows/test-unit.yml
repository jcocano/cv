# Runs the Vitest suite. Reusable workflow only: invoked by `ci.yml` on
# pull_request and by `deploy.yml` on push to main. Kept as its own file so
# test failures surface as an isolated `test-unit` job, which makes triage
# obvious when both unit and visual suites exist in the same pipeline.
#
# Why three setup steps before `npm test`:
#   1. Warm up: a brief `astro dev` boot (killed via `timeout`) is the only
#      reliable way to populate Astro v6's content layer data store so that
#      `getCollection` works inside vitest's experimental_AstroContainer
#      render-tests. `astro sync` and `astro build` alone are not enough
#      (validated against Astro 6.2.1). Exit code 124 from `timeout` is
#      expected and ignored via `|| true`.
#   2. Build: produces `dist/` so the a11y axe tests in `tests/a11y/` can
#      audit the actual built HTML pages.
#   3. Test: runs vitest against the now-warmed content layer and built
#      artifact.
name: Unit tests

# Force GitHub-provided JavaScript actions (e.g. actions/checkout,
# actions/setup-node) to run on Node 24 ahead of the 2026-06-02 deprecation
# of Node 20. Value must be a string per GitHub's env contract.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_call:

jobs:
  test-unit:
    name: vitest run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Warm up Astro content layer
        run: timeout 8 npx astro dev > /dev/null 2>&1 || true
      - name: Build site for a11y tests
        run: npm run build
      - name: Run vitest
        run: npm test
