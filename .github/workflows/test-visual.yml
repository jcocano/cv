# Runs the Playwright visual-regression suite against the built site.
# Reusable workflow only: invoked by `ci.yml` on pull_request and by
# `deploy.yml` on push to main.
#
# Why we run inside the official Playwright container
# ---------------------------------------------------
# `playwright.config.ts` enforces `maxDiffPixelRatio: 0.0`: a single byte
# of pixel difference is enough to fail the suite. Snapshots are therefore
# only meaningful when the renderer (Chromium + system fonts + libs) is
# byte-identical between the machine that generated them and the machine
# that asserts them. The official `mcr.microsoft.com/playwright:<version>`
# image pins exactly that environment: Chromium build, system fonts and
# every shared library Playwright needs are baked in, so CI renders the
# same pixels a local developer renders when they run inside the same
# image. This removes the "looks fine on my laptop, fails on ubuntu-latest"
# class of failures that a bare runner is prone to.
#
# Practical consequences:
#   1. We do NOT need `npx playwright install chromium --with-deps` here:
#      the container already provides Chromium and apt-level GUI libs.
#   2. Snapshot regeneration must happen inside the same container locally,
#      or the freshly generated PNGs will not match what CI produces. The
#      canonical command for the maintainer is:
#
#        docker run --rm -v "$PWD":/work -w /work \
#          --user "$(id -u):$(id -g)" \
#          mcr.microsoft.com/playwright:v1.60.0-noble \
#          bash -c "npm ci && npm run build && npm run test:visual -- --update-snapshots"
#
#      `--user "$(id -u):$(id -g)"` is mandatory: without it the container
#      runs as root and every file `npm ci` / `npm run build` writes to the
#      bind mount (node_modules/, dist/, test-results/, .astro/) ends up
#      owned by root on the host, which breaks subsequent `astro check` /
#      `vite` runs with EACCES. The real `container:` block below does not
#      need the flag because GitHub Actions runners are ephemeral.
#
#      After running it, the updated snapshots under
#      `tests/visual/__snapshots__/` MUST be committed in the same PR (or in
#      a follow-up push on the same branch) so that CI matches them.
#   3. `npm run test:visual` boots Playwright's webServer, which calls
#      `npm run preview` and serves `dist/`. The site therefore needs to be
#      built first; we do that in a dedicated step instead of relying on the
#      preview server to do it implicitly.
#
# Snapshots committed under `tests/visual/__snapshots__/` are the source of
# truth (see `docs/verification.md` for how to regenerate them locally).
name: Visual tests

on:
  workflow_call:

jobs:
  test-visual:
    name: playwright
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      # GENERATE_STATUS_BUILD_TIME pins the date rendered by
      # `getStaticBuildLabel` on `/the-system/` so visual baselines stay
      # stable across days. The pinned value matches `build_time` in
      # `src/fixtures/status-fixture.json` (which the visual spec uses to
      # stub `/cv/status.json`), so the meta "last build" cell and the
      # SiteStatus block share one frozen instant. Production deploys leave
      # the env var unset and the label reflects the real build date.
      - name: Build site for preview server
        env:
          GENERATE_STATUS_SHA: ${{ github.sha }}
          GENERATE_STATUS_BUILD_TIME: 2026-05-04T17:00:00.000Z
        run: npm run build
      - name: Run visual tests
        run: npm run test:visual
      # Upload `test-results/` so the actual diff PNGs and error-context.md files
      # produced by Playwright on failure can be inspected from the Actions UI.
      # Without this step the diffs only exist inside the ephemeral container and
      # the maintainer has to guess the cause of any drift, which historically led
      # to repeated "regenerate baselines and hope" commits instead of root-cause
      # fixes. The artifact is scoped to the run_id so reruns of the same workflow
      # do not collide, retention is bounded to 14 days, and the step is best
      # effort (it is fine for the directory to be missing on green runs).
      - name: Upload Playwright test-results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
