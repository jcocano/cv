# Runs `astro check` (TypeScript + Astro template diagnostics). Reusable
# workflow only: invoked by `ci.yml` on pull_request and by `deploy.yml` on
# push to main. Kept as its own file so type regressions are visible at a
# glance as a dedicated `typecheck` job and so the check can be required
# independently in branch protection.
name: Typecheck

# Force GitHub-provided JavaScript actions (e.g. actions/checkout,
# actions/setup-node) to run on Node 24 ahead of the 2026-06-02 deprecation
# of Node 20. Value must be a string per GitHub's env contract.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_call:

jobs:
  typecheck:
    name: astro check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run astro check
        run: npm run typecheck
